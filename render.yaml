services:
  - type: web
    name: ganesh-journal
    env: node
    plan: free
    disks:
      - name: uploads-disk
        mountPath: /var/data
        sizeGB: 1
    buildCommand: npm run render:build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_WEB
        value: "true"
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: UPLOAD_DIR
        value: /var/data/uploads
      # Optional (set in dashboard if needed):
      # - OPENAI_API_KEY
      # - OPENAI_MODEL
      # - OPENAI_BASE_URL
      # - OPENAI_APP_NAME
